apiVersion: apps/v1
kind: Deployment
metadata:
  name: henexapp
  labels:
    app: henexapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: henexapp
  template:
    metadata:
      labels:
        app: henexapp
    spec:
      containers:
      - name: henexapp
        image: henex/henexapp
        ports:
        - name: henexapp-port
          containerPort: 8080
      initContainers:
        - name: init-mydb
          image: busybox:1.28
          command: ['sh', '-c', "until nslookup vprodb.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for myservice; sleep 2; done"]
        - name: init-memecache
          image: busybox:1.28
          command: ['sh', '-c', "until nslookup vprocache01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for memecache; sleep 2; done"]
        - name: init-rabbitmq
          image: busybox:1.28
          command: ['sh', '-c', "until nslookup vpromq01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for rabbitmq; sleep 2; done"]